name: A11y audit (dry-run)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  a11y:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run a11y dry-run audit
        run: npm run test:a11y -- --reporter=list
        continue-on-error: true
        env:
          CI: true

      - name: Upload a11y audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-a11y-report
          path: docs/audit-a11y-*.md
          retention-days: 30

name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Check HTML files exist
        run: test -f index.html && test -f site.html
      - name: Check diacritics (user-facing copy)
        run: |
          chmod +x shared/check-diacritics.sh
          ./shared/check-diacritics.sh
      - name: Check CSS comments (anti-regression #275)
        run: |
          chmod +x shared/check-css-comments.sh
          ./shared/check-css-comments.sh
      - name: Run lint script tests
        run: |
          chmod +x tests/test-check-diacritics.sh
          ./tests/test-check-diacritics.sh
      - name: Run CSS comments script tests (anti-regression #275)
        run: |
          chmod +x tests/test-check-css-comments.sh
          ./tests/test-check-css-comments.sh
      - name: Check hardcoded tokens (anti-regression #279)
        run: |
          chmod +x shared/check-hardcoded-tokens.sh
          ./shared/check-hardcoded-tokens.sh
      - name: Check graph.css isolation (anti-barrel, #657)
        run: |
          chmod +x shared/check-graph-isolation.sh
          ./shared/check-graph-isolation.sh
      - name: Graph lib unit tests (pointerDrag/svg/sweep, #657)
        run: npm run test:graph-lib
      - name: Run hardcoded tokens script tests (anti-regression #279)
        run: |
          chmod +x tests/test-check-hardcoded-tokens.sh
          ./tests/test-check-hardcoded-tokens.sh
      - name: Check versions sync (anti-regression #377)
        run: |
          chmod +x shared/check-versions.sh
          ./shared/check-versions.sh
      - name: Run versions sync script tests (anti-regression #377)
        run: |
          chmod +x tests/test-check-versions.sh
          ./tests/test-check-versions.sh
      - name: nav.js syntax regression (#206, #378)
        run: npm run test:syntax
      # check-components.sh lint le registre / les consommateurs hors DS.
      # Lance sur shared/css (CSS du DS) : 11 warnings de dette preexistante
      # (classes modifier ex: .tooltip--left non enumerees dans le registre).
      # continue-on-error tant que la dette n'est pas resorbee (cf. #378).
      - name: check-components registry lint (#378, warn-only)
        run: |
          chmod +x shared/check-components.sh
          ./shared/check-components.sh shared/css
        continue-on-error: true
      - name: Registry validation — phantoms (#516) + React parity (#523) + frontière (#511)
        run: node bin/generate-registry.js --check
      # Parsing statique pur (node, zéro navigateur, zéro dépendance) — < 5s.
      - name: Nav sections manifest validation (#528)
        run: node bin/generate-nav-sections.js --check
      - name: Version notes inline validation (#645)
        run: node bin/generate-version-notes.js --check
      - name: Version notes generator tests (#645)
        run: npm run test:version-notes
  # @msyx-dev/react (packages/react) — suite vitest (jsdom).
  # 136 tests valides localement via vitest (npm). Le chemin exact
  # corepack + pnpm install --frozen-lockfile sur Node 24 n'a PAS pu
  # etre verifie localement (env local = Node 20, corepack resout pnpm
  # vers une version requierant Node 22+). continue-on-error: true tant
  # que le chemin CI n'est pas confirme vert (cf. #378).
  react:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Enable corepack
        run: corepack enable
      - name: Install deps (pnpm, frozen lockfile)
        run: |
          cd packages/react
          pnpm install --frozen-lockfile
      - name: Run react tests (vitest)
        run: |
          cd packages/react
          pnpm test
        continue-on-error: true
  perf-budget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Run perf budget (warn-only)
        run: |
          chmod +x shared/perf-budget.sh
          ./shared/perf-budget.sh
        continue-on-error: true
      - name: Emit summary
        run: |
          echo "## Perf budget report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ./shared/perf-budget.sh >> $GITHUB_STEP_SUMMARY 2>&1 || true
          echo '```' >> $GITHUB_STEP_SUMMARY

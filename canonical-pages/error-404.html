<!DOCTYPE html>
<html lang="fr" data-theme="msyx" data-mode="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page introuvable — msyx Design System</title>
  <!-- Anti-FOUC inline (synchrone, avant peinture) -->
  <script>
    (function(){
      var t = localStorage.getItem('msyx-theme') || 'msyx';
      var m = localStorage.getItem('msyx-mode') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
      document.documentElement.setAttribute('data-mode', m);
    })();
  </script>
  <link rel="stylesheet" href="../shared/styles.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-xl) var(--space-lg);
      background: var(--primary);
    }
    .error-wrap {
      text-align: center;
      max-width: 520px;
    }
    .error-code {
      font-family: var(--font-display);
      font-size: clamp(5rem, 20vw, 9rem);
      font-weight: var(--fw-extrabold);
      line-height: 1;
      background: var(--gradient-1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0 0 var(--space-md);
      user-select: none;
    }
    .error-card {
      background: var(--surface);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: var(--space-xl) var(--space-2xl);
      backdrop-filter: blur(12px);
    }
    .error-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: var(--fw-semibold);
      color: var(--text);
      margin: 0 0 var(--space-sm);
    }
    .error-description {
      color: var(--text-muted);
      line-height: var(--lh-base);
      margin: 0 0 var(--space-xl);
    }
    .error-actions {
      display: flex;
      gap: var(--space-sm);
      justify-content: center;
      flex-wrap: wrap;
    }
    .error-breadcrumb {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-xs);
      margin-bottom: var(--space-lg);
      font-size: 0.8125rem;
      color: var(--text-muted);
    }
    .error-breadcrumb a {
      color: var(--accent);
    }
    .error-breadcrumb span {
      opacity: 0.4;
    }
  </style>
</head>
<body>
  <main class="error-page">
    <div class="error-wrap">
      <div class="error-code" aria-label="Erreur 404">404</div>

      <div class="error-card">
        <nav class="error-breadcrumb" aria-label="Fil d'Ariane">
          <a href="/">Accueil</a>
          <span aria-hidden="true">/</span>
          <span aria-current="page">Page introuvable</span>
        </nav>

        <h1 class="error-title">Page introuvable</h1>
        <p class="error-description">
          La page que vous cherchez n'existe pas ou a été déplacée.
          Vérifiez l'URL ou retournez à l'accueil.
        </p>

        <div class="error-actions">
          <a href="/" class="btn-primary">&#8592; Retour à l'accueil</a>
          <button type="button" class="btn-ghost">Signaler ce problème</button>
        </div>
      </div>
    </div>
  </main>

  <script src="../shared/nav.js"></script>
  <script src="../shared/components.js"></script>
</body>
</html>

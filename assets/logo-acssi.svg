<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 256" role="img" aria-label="ACSSI">
  <title>ACSSI</title>
  <desc>Wordmark ACSSI — mark à gauche, wordmark or sur marine</desc>
  <defs>
    <linearGradient id="acssi-wm-marine" gradientUnits="objectBoundingBox" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00345f"/>
      <stop offset="100%" stop-color="#00243f"/>
    </linearGradient>
  </defs>
  <!-- Fond marine arrondi -->
  <rect x="0" y="0" width="720" height="256" rx="48" ry="48" fill="url(#acssi-wm-marine)"/>
